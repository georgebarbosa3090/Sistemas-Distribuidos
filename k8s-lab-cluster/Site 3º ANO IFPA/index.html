<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Programação Web | IFPA</title>

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topo">
        <img src="imagens/IFPA-_Altamira_LOGO-removebg-preview.png" alt="Instituto Federal do Pará" class="logo-ifpa">

        <div>
            <h1>Programação Web</h1>
            <p>Curso Técnico em Informática • 3º Ano</p>
        </div>
    </header>

    <main class="container">

        <section class="card">
            <h2>🏫 Instituição</h2>
            <p>Instituto Federal do Pará – IFPA</p>
        </section>

        <section class="card">
            <h2>🎯 Objetivo da Disciplina</h2>
            <p>Desenvolver aplicações web modernas utilizando HTML, CSS e JavaScript.</p>
        </section>

        <section class="card interacao">
            <h2>👨‍💻 Interação</h2>

            <input type="text" id="nome" placeholder="Digite seu nome">
            <button id="btnMensagem">Entrar</button>

            <p id="mensagem"></p>
        </section>

        <section class="card">
            <h2>🎨 Tema</h2>
            <button id="btnTema">Alternar tema</button>
        </section>

    </main>

    <footer>
        <p>IFMA • Técnico em Informática • Programação Web</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
